<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
        Magic Shop
    </title>
    <link rel="icon" type="image/x-icon" href="/img/fav-icon-my-melody.png" />

    <link rel="stylesheet" href="/style/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Delius&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poiret+One&display=swap"
        rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet" />
</head>

<body>
    <!------------Header----------------->
    <header>
        <h1>
            Magic Shop
        </h1>
        <form class="pesquisar">
            <input type="text" name="pesquisa" id="" placeholder="Faça sua pesquisa" />
            <button type="submit">
                Pesquisar
            </button>
        </form>
        <ul>
            <li>
                <a href="/HTML/carrinho.html">
                    <img src="/banco de imagens - Magic Shop/icones/icon-carrinho.png" alt="carrinho de compras" />
                </a>
            </li>
            <li>
                <a href="#">
                    <img src="/banco de imagens - Magic Shop/icones/icon-profile.png" alt="icone de perfil" />
                </a>
            </li>
        </ul>
    </header>
    <!------------------Nav-bar---------->
    <nav class="nav-bar">
        <ul>
            <li>
                <a href="#home">
                    Home
                </a>
            </li>
            <li>
                <a href="/HTML/produtos.html">
                    Produtos
                </a>
            </li>
            <li>
                <a href="#mais-vendidos">
                    Mais Vendidos
                </a>
            </li>
            <li>
                <a href="/HTML/sobre-nos.html">
                    Sobre Nós
                </a>
            </li>
            <li>
                <a href="/HTML/contate-nos.html">
                    Contatos
                </a>
            </li>
        </ul>
    </nav>

    <main>
        <section class="formulario">
            <h2>
                Finalizar compra 
            </h2>
            
<form>
  <fieldset class="meios-pagamento">
    <legend>
        Escolha o método de pagamento:
    </legend>

    <button type="button" class="botao-pagamento">
      <img src="/banco de imagens - Magic Shop/Elementos - Site/boleto-logo.png" alt="Boleto Bancário" />
    </button>

    <button type="button" class="botao-pagamento">
      <img src="visa.png" alt="Cartão Visa" />
    </button>

    <button type="button" class="botao-pagamento">
      <img src="mastercard.png" alt="Cartão Mastercard" />
    </button>

    <button type="button" class="botao-pagamento">
      <img src="pix.png" alt="Pix" />
    </button>
  </fieldset>
</form>
        </section>
    </main>
</body>

</html>
